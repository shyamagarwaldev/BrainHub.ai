name: secondbrain-ai

services:
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant_db
    restart: unless-stopped
    ports:
      - 6333:6333
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - sb_ai_network

  postgres:
    image: postgres:16
    container_name: postgres_db
    ports:
      - 5432:5432
    volumes:
      - postgres_db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: SecondBrain
    networks:
      - sb_ai_network

volumes:
  qdrant_storage:
  postgres_db:

networks:
  sb_ai_network:
    driver: bridge
