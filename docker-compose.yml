name: secondbrain-ai

services:
  backend:
    build: ./backend
    container_name: second-brain-ai-backend
    ports:
      - "8080:8080"
    depends_on:
      - retrieval
      - qdrant
      - postgres
      - valkey
    env_file:
      - "./backend/.env"
    healthcheck:
      test: "curl -f http://localhost:8080/health"
    networks:
      - sb_ai_network
  worker:
    build: ./backend
    container_name: worker_service
    depends_on:
      - valkey
      - postgres
      - qdrant
      - retrieval
    env_file:
      - "./backend/.env"
    command: ["bun", "run", "worker"]
    networks:
      - sb_ai_network
  retrieval:
    build: ./retrieval-service
    container_name: second-brain-ai-retrieval-service
    ports:
      - "8001:8001"
    depends_on:
      - qdrant
    env_file:
      - "./retrieval-service/.env"
    healthcheck:
      test: "curl -f http://localhost:8001/health"
    networks:
      - sb_ai_network
  valkey:
    image: valkey/valkey:latest
    container_name: valkey_server
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    ports:
      - 6379:6379
    networks:
      - sb_ai_network
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_db
    restart: unless-stopped
    ports:
      - 6333:6333
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - sb_ai_network

  postgres:
    image: postgres:16
    container_name: postgres_db
    ports:
      - 5432:5432
    volumes:
      - postgres_db:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: SecondBrain
    networks:
      - sb_ai_network

volumes:
  qdrant_storage:
  postgres_db:
  valkey_data:

networks:
  sb_ai_network:
    driver: bridge
