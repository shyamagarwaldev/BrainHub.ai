services:
  embedding-worker:
    build:
      context: .
      dockerfile: ./docker/dev.embedding.worker.Dockerfile
    command: bun run dev --filter=@repo/embedding-worker
    env_file:
      - .env
    networks:
      - network.brainhub.ai
    depends_on:
      weaviate:
        condition: service_healthy
      postgres:
        condition: service_started
      valkey:
        condition: service_started
      reranker-transformers:
        condition: service_started
  extraction-worker:
    build:
      context: .
      dockerfile: ./docker/dev.extraction.worker.Dockerfile
    command: bun run dev --filter=@repo/extraction-worker
    env_file:
      - .env
    networks:
      - network.brainhub.ai
    depends_on:
      - postgres
      - valkey
  valkey:
    image: valkey/valkey:9.1.0
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    networks:
      - network.brainhub.ai
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "mysecretpassword"
      POSTGRES_DB: "brainhub"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - network.brainhub.ai
  weaviate:
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://localhost:8080/v1/.well-known/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    image: cr.weaviate.io/semitechnologies/weaviate:1.36.9
    ports:
      - 8080:8080
      - 50051:50051
    volumes:
      - weaviate_data:/var/lib/weaviate
    restart: on-failure:0
    environment:
      ENABLE_MODULES: reranker-transformers
      RERANKER_INFERENCE_API: http://reranker-transformers:8080
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      CLUSTER_HOSTNAME: "node1"
    networks:
      - network.brainhub.ai
  reranker-transformers:
    image: cr.weaviate.io/semitechnologies/reranker-transformers:cross-encoder-ms-marco-MiniLM-L-6-v2
    environment:
      ENABLE_CUDA: 0
    networks:
      - network.brainhub.ai
  backend:
    build:
      context: .
      dockerfile: docker/dev.backend.Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: bun run dev --filter=@repo/backend
    depends_on:
      weaviate:
        condition: service_healthy
      postgres:
        condition: service_started
      valkey:
        condition: service_started
      reranker-transformers:
        condition: service_started
    networks:
      - network.brainhub.ai
volumes:
  weaviate_data:
  postgres_data:
  valkey_data:
networks:
  network.brainhub.ai:
